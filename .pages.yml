# Pages CMS — Empyrria Sigil Codex (governance-hardened Zierota profile)
# Canon posture, identity, doctrine blocks, media path, and governance dates are readonly.
# Docs: https://pagescms.org/docs/configuration

media:
  input: public/media/sigils
  output: /media/sigils

content:
  - name: codex
    label: Sigils codex
    type: file
    path: src/data/sigils.json
    format: json
    operations:
      create: false
      delete: false
    fields:
      - name: "$schema"
        label: JSON Schema
        type: string
        required: false
        readonly: true
        description: "Preserved from repo; not edited in Pages."

      - name: version
        label: Version
        type: string
        required: true
        readonly: true
        description: "Corpus version; governance / release change only."

      - name: sigils
        label: Sigils
        type: object
        required: true
        list:
          min: 1
          collapsible:
            collapsed: false
            summary: "{name} — {slug}"
        fields:
          # --- Zierota-editable (safe surface) ---
          - name: title
            label: Title
            type: string
            required: false
            description: "Optional display override; omit when unused."

          - name: meaning
            label: Meaning
            type: text
            required: false

          - name: facets
            label: Facets / Categories
            type: string
            list: true
            required: false

          - name: terms
            label: Associated Terms
            type: string
            list: true
            required: false
            hidden: true

          - name: characterLink
            label: Character Link
            type: text
            required: false
            description: "Optional editorial — character or persona association (plain text)."

          - name: loreContext
            label: Lore Context
            type: text
            required: false
            description: "Optional editorial lore; does not replace doctrine."

          - name: sigilRelationships
            label: Sigil Relationships
            type: string
            list: true
            required: false
            description: "Declared relationship labels only (strings). No automatic links."

          - name: placeOfOrigin
            label: Place of Origin
            type: string
            required: false
            description: "Optional symbolic or narrative origin."

          # --- Readonly (canon + identity + governance) ---
          - name: slug
            label: Slug (ID — do not change)
            type: string
            required: true
            readonly: true
            pattern:
              regex: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
              message: "Lowercase kebab-case only."

          - name: name
            label: Name
            type: string
            required: true
            readonly: true

          - name: layer
            label: Layer
            type: string
            required: false
            readonly: true

          - name: category
            label: Category
            type: string
            required: false
            readonly: true

          - name: doctrine
            label: Doctrine
            type: text
            required: true
            readonly: true

          - name: usage
            label: Usage Context
            type: text
            required: false
            readonly: true

          - name: geometry
            label: Geometry Logic
            type: text
            required: false
            readonly: true

          - name: color
            label: Color Logic
            type: text
            required: false
            readonly: true
            hidden: true

          - name: image
            label: Image
            type: image
            required: false
            readonly: true
            description: "Public path under /media/sigils/…"

          - name: status
            label: Status
            type: select
            required: false
            readonly: true
            options:
              values:
                - name: draft
                  label: draft
                - name: provisional
                  label: provisional
                - name: approved
                  label: approved
                - name: deprecated
                  label: deprecated
                - name: archived
                  label: archived

          - name: visibility
            label: Visibility
            type: select
            required: false
            readonly: true
            options:
              values:
                - name: marked_public
                  label: Marked public
                - name: internal
                  label: Internal
                - name: public
                  label: Public
                - name: hidden
                  label: Hidden
                - name: archive_only
                  label: Archive only

          - name: reviewReference
            label: Review Reference
            type: string
            required: false
            readonly: true
            hidden: true

          - name: deprecatedReason
            label: Deprecated Reason
            type: text
            required: false
            readonly: true
            hidden: true

          - name: archivedReason
            label: Archived Reason
            type: text
            required: false
            readonly: true
            hidden: true

          - name: lastCanonReview
            label: Last Canon Review
            type: date
            required: false
            readonly: true

          - name: underlay
            label: Underlay / System Context
            type: text
            required: false
            readonly: true
