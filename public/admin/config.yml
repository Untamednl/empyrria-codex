local_backend: true

site_url: "https://empyrria-codex.netlify.app"

backend:
  name: git-gateway
  branch: main

media_folder: public/media/sigils
public_folder: /media/sigils

collections:
  - name: sigils
    label: Sigils
    delete: false
    files:
      - label: Sigils
        name: codex
        file: src/data/sigils.json
        format: json
        preview_path: "sigils/{{fields.slug}}"
        fields:
          - label: Version
            name: version
            widget: string
            required: true
          - label: Sigils
            name: sigils
            widget: list
            required: true
            summary: "{{fields.name}} — {{fields.slug}}"
            fields:
              - { label: "Name", name: "name", widget: "string", required: true }
              - label: "Title"
                name: "title"
                widget: "string"
                required: false
                hint: "Optional short display override for ceremonial headings. Omit to use Name on site."
              - label: "Slug (ID — do not change)"
                name: "slug"
                widget: "string"
                required: true
                hint: "Stable page ID. Avoid changing after publishing."
              - label: "Live Preview"
                name: "preview_link"
                widget: "preview-link"
                required: false
                hint: "UI only — not saved"
                pattern: ["^$", ""]
              - label: "Doctrine"
                name: "doctrine"
                widget: "text"
                required: true
                hint: "Core doctrine / meaning shown on the sigil detail page."
              - label: "Meaning"
                name: "meaning"
                widget: "text"
                required: false
                hint: "Optional short doctrine-adjacent summary. Omit when unused."
              - label: "Layer"
                name: "layer"
                widget: "string"
                required: false
                hint: "Optional restrained archive layer label. Omit when unused."
              - label: "Category"
                name: "category"
                widget: "string"
                required: false
                hint: "Broad category such as Core / Energy."
              - label: "Status"
                name: "status"
                widget: "select"
                required: false
                options:
                  - draft
                  - provisional
                  - approved
                  - deprecated
                  - archived
                hint: "Canon status is governance-controlled. Approved requires final canon authority."
              - label: "Visibility"
                name: "visibility"
                widget: "select"
                required: false
                options:
                  - public
                  - marked_public
                  - hidden
                  - archive_only
                  - internal
                hint: "Visibility controls exposure only. Public does not mean approved canon."
              - label: "Review Reference"
                name: "reviewReference"
                widget: "string"
                required: false
                hint: "Optional reference to a documented canon review decision."
              - label: "Deprecated Reason"
                name: "deprecatedReason"
                widget: "text"
                required: false
                hint: "Required later when status is deprecated."
              - label: "Archived Reason"
                name: "archivedReason"
                widget: "text"
                required: false
                hint: "Required later when status is archived."
              - label: "Last Canon Review"
                name: "lastCanonReview"
                widget: "string"
                required: false
                hint: "ISO date of latest canon review, for example 2026-05-08."
              - label: "Facets / Categories"
                name: facets
                widget: list
                required: false
                hint: "Broad grouping tags."
              - label: "Geometry Logic"
                name: "geometry"
                widget: "text"
                required: false
                hint: "Symbolic geometry logic."
              - label: "Color Logic"
                name: "color"
                widget: "text"
                required: false
                hint: "Symbolic color logic."
              - label: "Associated Terms"
                name: terms
                widget: list
                required: false
                hint: "Associated search / symbolic terms."
              - label: "Usage Context"
                name: "usage"
                widget: "text"
                required: false
                hint: "Where or how this sigil is used."
              - label: "Underlay / System Context"
                name: "underlay"
                widget: "text"
                required: false
                hint: "Narrative-only text. Leave empty if unused."
              - label: "Image"
                name: "image"
                widget: "image"
                required: false
                hint: "Optional image path."
